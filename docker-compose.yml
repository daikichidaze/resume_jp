services:
  jekyll:
    container_name: resume-jp-jekyll
    image: jekyll/builder:4.0
    entrypoint: []
    command:
      - /bin/sh
      - -lc
      - >
        (/usr/local/bin/bundle check || /usr/local/bin/bundle install --jobs 4 --retry 3) &&
        /usr/local/bin/bundle exec jekyll serve
        --watch
        --force_polling
        --verbose
        --livereload
        --host 0.0.0.0
        --port 4000
    volumes:
      - .:/srv/jekyll:Z
      - bundle_cache:/usr/local/bundle
    environment:
      JEKYLL_VERSION: 3.8
      BUNDLE_PATH: /usr/local/bundle
    ports:
      - 4000:4000

volumes:
  bundle_cache:
